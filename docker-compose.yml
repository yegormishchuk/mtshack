services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: iaas
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: iaas
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iaas -d iaas"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ./api-gateway
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://iaas:changeme@postgres:5432/iaas
      BACKEND_URL: http://localhost:8002
    depends_on:
      postgres:
        condition: service_healthy

  admin-panel:
    build: ./IaaS_frontend/admin-panel
    restart: unless-stopped
    ports:
      - "5177:80"
    depends_on:
      - api-gateway

  iaas-portal:
    build: ./IaaS_frontend/iaas-portal
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - api-gateway

  vps-frontend:
    build: ./IaaS_frontend/vps-frontend
    restart: unless-stopped
    ports:
      - "5176:80"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
